name: Lottery Data Auto Update

on:
  schedule:
    # 每天北京时间晚上 22:30 自动运行（大乐透通常 21:30 开奖）
    - cron: '30 14 * * *' 
  workflow_dispatch: # 允许你手动点击按钮立刻更新

jobs:
  update_data:
    runs-on: ubuntu-latest
    steps:
      - name: 检出代码
        uses: actions/checkout@v3

      - name: 设置 Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.9'

      - name: 安装抓取插件
        run: |
          pip install requests pandas beautifulsoup4

      - name: 执行爬虫抓取最新号码
        run: python lottery_crawler.py

      - name: 自动保存数据并推送到仓库
        run: |
          git config --global user.name "GitHub Action"
          git config --global user.email "action@github.com"
          git add dlt_data.csv ssq_data.csv
          git commit -m "自动更新开奖数据: $(date)" || exit 0
          git push
