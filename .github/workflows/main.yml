name: Lottery Data Auto Update

on:
  workflow_dispatch: # 支持手动触发
  schedule:
    - cron: '0 14 * * *' # 每天北京时间晚上22:00自动运行

jobs:
  update_data:
    runs-on: ubuntu-latest
    permissions: # 显式声明权限，确保万无一失
      contents: write
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v3

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.9'

      - name: Install dependencies
        run: |
          pip install requests pandas

      - name: Run crawler
        run: python lottery_crawler.py

      - name: Commit and Push changes
        run: |
          git config --local user.email "action@github.com"
          git config --local user.name "GitHub Action"
          git add dlt_data.csv ssq_data.csv
          git commit -m "自动更新开奖数据: $(date)" || echo "No changes to commit"
          git push
