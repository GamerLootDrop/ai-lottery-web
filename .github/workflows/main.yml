name: Lottery Data Auto Update

on:
  workflow_dispatch: # 支持手动触发
  schedule:
    - cron: '0 14 * * *' # 每天北京时间22:00

jobs:
  update_data:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v3

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.9'

      - name: Install dependencies
        run: pip install requests pandas

      - name: Run crawler
        run: |
          # 运行爬虫直接生成新的 CSV
          python lottery_crawler.py

      - name: Commit and Force Push
        run: |
          git config --local user.email "action@github.com"
          git config --local user.name "GitHub Action"
          
          # 关键：先拉取远程，但如果冲突，以本地新抓取的为准
          git add dlt_data.csv ssq_data.csv
          
          # 强制提交：即使有冲突也以现在的 100 期为准
          git commit -m "自动更新: $(date +'%Y-%m-%d %H:%M')" || echo "No changes"
          
          # 暴力推送：彻底解决 Exit code 1 的权限和历史冲突
          git push origin main --force
