name: Lottery Data Auto Update

on:
  workflow_dispatch:
  schedule:
    - cron: '0 14 * * *'

jobs:
  update_data:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v3

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.9'

      - name: Install dependencies
        run: pip install requests pandas

      - name: Run crawler
        run: |
          # 哪怕 CSV 是空的，脚本也必须强行运行并生成新文件
          python lottery_crawler.py

      - name: Force Push Changes
        run: |
          git config --local user.email "action@github.com"
          git config --local user.name "GitHub Action"
          git add dlt_data.csv ssq_data.csv
          # 即使没有变化也不要报错
          git commit -m "数据重刷: $(date)" || echo "No changes to commit"
          # 暴力推送，清除之前的冲突痕迹
          git push origin main --force
