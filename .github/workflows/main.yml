name: Lottery Data Auto Update

on:
  workflow_dispatch: # 支持手动触发
  schedule:
    - cron: '0 14 * * *' # 每天北京时间22:00

jobs:
  update_data:
    runs-on: ubuntu-latest
    permissions:
      contents: write # 必须保留，确保机器人能改写仓库
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v3
        with:
          # 关键：获取最新提交，避免本地和远程不同步
          persist-credentials: true 

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.9'

      - name: Install dependencies
        run: |
          pip install requests pandas

      - name: Run crawler
        run: |
          # 只运行一次，生成最新的 csv 文件
          python lottery_crawler.py

      - name: Commit and Push
        run: |
          git config --local user.email "action@github.com"
          git config --local user.name "GitHub Action"
          
          # 核心技巧：先暂存修改，拉取远程，再合并。
          # 这样能解决由于你在网页上手动改了 CSV 导致的冲突。
          git add dlt_data.csv ssq_data.csv
          
          # 只有在有数据变化时才操作
          if git diff --staged --quiet; then
            echo "数据没有变化，跳过更新。"
          else
            # 暂存当前抓取到的新数据
            git stash
            # 强制拉取远程最新版本
            git pull origin main --rebase
            # 把新抓到的数据应用回来
            git stash pop
            
            git add dlt_data.csv ssq_data.csv
            git commit -m "自动更新: $(date +'%Y-%m-%d %H:%M')"
            # 顺着推上去，不需要 --force，更安全稳定
            git push origin main
          fi
