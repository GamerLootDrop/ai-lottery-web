name: Lottery Data Auto Update

on:
  workflow_dispatch: # 手动触发
  schedule:
    - cron: '0 14 * * *' # 每天北京时间22:00

jobs:
  update_data:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v3
        with:
          fetch-depth: 0

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.9'

      - name: Install dependencies
        run: pip install requests pandas

      - name: Run crawler
        run: python lottery_crawler.py

      - name: Force Push Changes
        run: |
          git config --local user.email "action@github.com"
          git config --local user.name "GitHub Action"
          
          # 强制同步远程状态，抹平之前的冲突
          git fetch origin main
          git reset --hard origin main
          
          # 重新运行爬虫确保拿到最新数（reset会抹掉刚才运行的结果）
          python lottery_crawler.py
          
          git add dlt_data.csv ssq_data.csv
          
          # 检查是否有变动
          if git diff --staged --quiet; then
            echo "No changes"
          else
            git commit -m "暴力同步开奖数据: $(date)"
            # 使用 --force 强制推送，解决一切 Exit code 1
            git push origin main --force
          fi
